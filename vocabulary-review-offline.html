<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
:root {
  color-scheme: light dark;
  --background: #f3f5f9;
  --surface: #ffffff;
  --surface-raised: #f8faff;
  --text: #172033;
  --muted: #59657a;
  --border: #cad2e0;
  --accent: #3157d5;
  --accent-strong: #2441a6;
  --accent-text: #ffffff;
  --success: #176a45;
  --danger: #a72b32;
  --focus: #e07a00;
  --shadow: 0 18px 45px rgb(28 42 70 / 12%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

@media (prefers-color-scheme: dark) {
  :root {
    --background: #101522;
    --surface: #1a2232;
    --surface-raised: #202a3c;
    --text: #f2f5fb;
    --muted: #b3bed0;
    --border: #3e4a60;
    --accent: #8ba7ff;
    --accent-strong: #b2c3ff;
    --accent-text: #101522;
    --success: #75d6a8;
    --danger: #ff9ba1;
    --focus: #ffbd66;
    --shadow: 0 18px 45px rgb(0 0 0 / 28%);
  }
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--background);
  color: var(--text);
  line-height: 1.55;
  overflow-wrap: anywhere;
}

button,
select,
input {
  min-height: 44px;
  border: 1px solid var(--border);
  border-radius: 0.65rem;
  background: var(--surface);
  color: var(--text);
  font: inherit;
}

button {
  padding: 0.65rem 1rem;
  cursor: pointer;
  font-weight: 700;
}

button:hover:not(:disabled) {
  border-color: var(--accent);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.65;
}

button:focus-visible,
select:focus-visible,
input:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 3px;
}

select,
input {
  width: 100%;
  margin-top: 0.35rem;
  padding: 0.55rem 0.7rem;
}

.shell {
  width: min(900px, calc(100% - 2rem));
  max-width: 900px;
  margin-inline: auto;
}

.site-header {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  padding: 1.4rem 0 0;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 1rem;
  font-size: clamp(1.7rem, 5vw, 2.5rem);
}

.eyebrow,
.face-label {
  margin-bottom: 0.25rem;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.09em;
  text-transform: uppercase;
}

.view-tabs,
.action-row {
  display: flex;
  flex-wrap: wrap;
  gap: 0.65rem;
}

.view-tabs button {
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
}

.view-tabs button[aria-pressed="true"] {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--accent-text);
}

main {
  padding-block: 1.2rem 3rem;
}

.status-message {
  min-height: 1.55rem;
  color: var(--muted);
}

.view {
  padding: clamp(1rem, 4vw, 2rem);
  border: 1px solid var(--border);
  border-radius: 1rem;
  background: var(--surface);
  box-shadow: var(--shadow);
}

.section-heading {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 1rem;
}

.section-heading h2 {
  margin-bottom: 0;
}

.section-heading label {
  width: min(14rem, 100%);
  color: var(--muted);
  font-weight: 700;
}

.count,
.source-line {
  color: var(--muted);
  font-weight: 700;
}

.flashcard {
  display: grid;
  min-height: 280px;
  margin-bottom: 1rem;
  padding: clamp(1.25rem, 5vw, 2.5rem);
  border: 2px solid var(--border);
  border-radius: 1rem;
  background: var(--surface-raised);
}

.card-face {
  align-self: center;
}

.card-face h3 {
  margin-bottom: 0.5rem;
  font-size: clamp(2rem, 7vw, 3.5rem);
  line-height: 1.12;
}

.definition {
  font-size: clamp(1.1rem, 3vw, 1.35rem);
}

.translation {
  color: var(--accent-strong);
  font-size: 1.2rem;
  font-weight: 800;
}

.flip-hint {
  color: var(--muted);
}

.action-row {
  margin-top: 0.75rem;
}

.action-row > * {
  flex: 1 1 10rem;
}

.primary {
  border-color: var(--accent);
  background: var(--accent);
  color: var(--accent-text);
}

.danger {
  border-color: var(--danger);
  color: var(--danger);
}

.quiz-setup {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 1rem;
  align-items: end;
}

.quiz-setup label,
.spelling-form label {
  font-weight: 700;
}

.quiz-setup button {
  grid-column: 1 / -1;
}

.quiz-stage {
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}

.quiz-stage h3 {
  font-size: clamp(1.35rem, 4vw, 2rem);
}

.quiz-options {
  display: grid;
  gap: 0.7rem;
}

.quiz-options button {
  width: 100%;
  text-align: left;
}

.spelling-form {
  display: grid;
  gap: 0.75rem;
}

.feedback {
  margin-top: 1rem;
  font-weight: 800;
}

.feedback[data-result="correct"] {
  color: var(--success);
}

.feedback[data-result="incorrect"] {
  color: var(--danger);
}

.correct-answer {
  font-weight: 700;
}

.mistake-list {
  display: grid;
  gap: 0.7rem;
  padding-left: 1.4rem;
}

.mistake-list li::marker {
  color: var(--danger);
}

[hidden] {
  display: none !important;
}

@media (max-width: 600px) {
  .shell {
    width: min(100% - 1rem, 900px);
  }

  .section-heading {
    align-items: stretch;
    flex-direction: column;
  }

  .section-heading label,
  .view-tabs button {
    width: 100%;
  }

  .view-tabs {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .view-tabs button {
    padding-inline: 0.35rem;
  }

  .quiz-setup {
    grid-template-columns: 1fr;
  }

  .quiz-setup button {
    grid-column: auto;
  }
}

  </style>
</head>
<body>
  <header class="site-header">
    <div class="shell">
      <p class="eyebrow">Computer Science English</p>
      <h1>Vocabulary Review</h1>
      <nav class="view-tabs" aria-label="Study mode">
        <button type="button" data-view-button="cards-view" aria-controls="cards-view" aria-pressed="true">Flashcards</button>
        <button type="button" data-view-button="quiz-view" aria-controls="quiz-view" aria-pressed="false">Quiz</button>
        <button type="button" data-view-button="mistakes-view" aria-controls="mistakes-view" aria-pressed="false">Mistakes</button>
      </nav>
    </div>
  </header>

  <main class="shell">
    <p id="status-message" class="status-message" role="status" aria-live="polite"></p>

    <section id="cards-view" class="view" aria-labelledby="cards-heading">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Study</p>
          <h2 id="cards-heading">Flashcards</h2>
        </div>
        <label for="card-order">Card order
          <select id="card-order">
            <option value="sequential">PDF order</option>
            <option value="random">Random order</option>
          </select>
        </label>
      </div>

      <p id="card-count" class="count" aria-live="polite"></p>
      <article id="flashcard" class="flashcard" aria-live="polite">
        <div id="card-front" class="card-face">
          <p class="face-label">Term</p>
          <h3 id="card-term"></h3>
          <p class="flip-hint">Use “Flip” to see the definition.</p>
        </div>
        <div id="card-back" class="card-face" hidden>
          <p class="face-label">Definition</p>
          <p id="card-definition" class="definition"></p>
          <p id="card-zh" class="translation"></p>
          <p class="source-line"><span id="card-source"></span> · <span id="card-page"></span></p>
        </div>
      </article>

      <div class="action-row card-navigation" aria-label="Card navigation">
        <button id="previous-card" type="button">Previous</button>
        <button id="flip-card" type="button" class="primary">Flip</button>
        <button id="next-card" type="button">Next</button>
      </div>
      <div class="action-row" aria-label="Mark current card">
        <button id="mark-review" type="button">Mark for review</button>
        <button id="mark-familiar" type="button">Mark familiar</button>
      </div>
    </section>

    <section id="quiz-view" class="view" aria-labelledby="quiz-heading" hidden>
      <div class="section-heading">
        <div>
          <p class="eyebrow">Practice</p>
          <h2 id="quiz-heading">Quiz</h2>
        </div>
      </div>
      <div class="quiz-setup">
        <label for="quiz-mode">Question type
          <select id="quiz-mode">
            <option value="term-to-zh">Term → Chinese</option>
            <option value="definition-to-term">Definition → term</option>
            <option value="spelling">Spelling</option>
          </select>
        </label>
        <label for="quiz-scope">Question scope
          <select id="quiz-scope">
            <option value="random">10 random questions</option>
            <option value="mistakes">Up to 10 mistakes</option>
          </select>
        </label>
        <button id="start-quiz" type="button" class="primary">Start quiz</button>
      </div>

      <div id="quiz-stage" class="quiz-stage" aria-live="polite" hidden>
        <p id="quiz-progress" class="count"></p>
        <h3 id="quiz-prompt"></h3>
        <div id="quiz-options" class="quiz-options"></div>
        <form id="spelling-form" class="spelling-form" hidden>
          <label for="spelling-answer">Type the English term</label>
          <input id="spelling-answer" name="answer" type="text" autocomplete="off" spellcheck="false">
          <button id="submit-spelling" type="submit" class="primary">Check answer</button>
        </form>
        <div id="quiz-feedback" class="feedback" role="status"></div>
        <p id="quiz-correct-answer" class="correct-answer"></p>
        <button id="next-question" type="button" class="primary" hidden>Next question</button>
      </div>
    </section>

    <section id="mistakes-view" class="view" aria-labelledby="mistakes-heading" hidden>
      <div class="section-heading">
        <div>
          <p class="eyebrow">Review</p>
          <h2 id="mistakes-heading">Mistakes</h2>
        </div>
      </div>
      <p id="last-score"></p>
      <ul id="mistake-list" class="mistake-list"></ul>
      <div class="action-row">
        <button id="retry-mistakes" type="button" class="primary">Retry mistakes</button>
        <button id="clear-progress" type="button" class="danger">Clear saved progress</button>
      </div>
    </section>
  </main>

  { id: "p5-exercise-funds", term: "funds", definition: "money, often for a specific purpose such as a project or business venture", zh: "資金；款項", page: 5, source: "exercise" },
  { id: "p5-exercise-downtime", term: "downtime", definition: "the time during which a machine, especially a computer, is not working or is not able to be used", zh: "停機時間", page: 5, source: "exercise" },
  { id: "p5-exercise-future-proof", term: "future-proof", definition: "to design software, a computer, etc. so that it can still be used for many years, even when technology changes", zh: "能適應未來的；面向未來的", page: 5, source: "exercise" }

const normalizeAnswer = (value) =>
  String(value).trim().toLocaleLowerCase("en").replace(/\s+/g, " ");

const gradeSpelling = (input, term) =>
  normalizeAnswer(input) === normalizeAnswer(term);

const shuffled = (values, random = Math.random) => {
  const copy = [...values];
  for (let index = copy.length - 1; index > 0; index -= 1) {
    const target = Math.floor(random() * (index + 1));
    [copy[index], copy[target]] = [copy[target], copy[index]];
  }
  return copy;
};

const selectQuizEntries = (pool, random = Math.random) =>
  shuffled(pool, random).slice(0, 10);

function createChoiceQuestion(entry, pool, mode, random = Math.random) {
  const toChinese = mode === "term-to-zh";
  const prompt = toChinese ? entry.term : entry.definition;
  const answer = toChinese ? entry.zh : entry.term;
  const distractors = pool
    .filter((item) => item.id !== entry.id)
    .map((item) => toChinese ? item.zh : item.term)
    .filter((value, index, values) => value !== answer && values.indexOf(value) === index);
  return {
    entryId: entry.id,
    prompt,
    answer,
    options: shuffled([answer, ...shuffled(distractors, random).slice(0, 3)], random)
  };
}

const defaultProgress = () =>
  ({ familiar: [], review: [], mistakes: [], lastScore: null });

function mergeProgress(value, validIds) {
  const safe = value && typeof value === "object" ? value : {};
  const ids = (list) => [
    ...new Set(Array.isArray(list) ? list.filter((id) => validIds.has(id)) : [])
  ];
  const score = safe.lastScore
    && Number.isInteger(safe.lastScore.correct)
    && Number.isInteger(safe.lastScore.total)
    ? { correct: safe.lastScore.correct, total: safe.lastScore.total }
    : null;
  return {
    familiar: ids(safe.familiar),
    review: ids(safe.review),
    mistakes: ids(safe.mistakes),
    lastScore: score
  };
}

function progressStorage(storage, key) {
  return {
    load(validIds) {
      try {
        return mergeProgress(JSON.parse(storage.getItem(key) || "null"), validIds);
      } catch {
        return defaultProgress();
      }
    },
    save(progress) {
      try {
        storage.setItem(key, JSON.stringify(progress));
        return true;
      } catch {
        return false;
      }
    },
    clear() {
      try {
        storage.removeItem(key);
        return true;
      } catch {
        return false;
      }
    }
  };
}


const STORAGE_KEY = "cs-vocabulary-progress-v1";
const QUIZ_MODES = new Set(["term-to-zh", "definition-to-term", "spelling"]);
const byId = new Map(VOCABULARY.map((entry) => [entry.id, entry]));
const validIds = new Set(byId.keys());

const elements = {
  viewButtons: [...document.querySelectorAll("[data-view-button]")],
  views: [...document.querySelectorAll(".view")],
  status: document.querySelector("#status-message"),
  cardOrder: document.querySelector("#card-order"),
  cardCount: document.querySelector("#card-count"),
  cardFront: document.querySelector("#card-front"),
  cardBack: document.querySelector("#card-back"),
  cardTerm: document.querySelector("#card-term"),
  cardDefinition: document.querySelector("#card-definition"),
  cardZh: document.querySelector("#card-zh"),
  cardSource: document.querySelector("#card-source"),
  cardPage: document.querySelector("#card-page"),
  previousCard: document.querySelector("#previous-card"),
  flipCard: document.querySelector("#flip-card"),
  nextCard: document.querySelector("#next-card"),
  markReview: document.querySelector("#mark-review"),
  markFamiliar: document.querySelector("#mark-familiar"),
  quizMode: document.querySelector("#quiz-mode"),
  quizScope: document.querySelector("#quiz-scope"),
  startQuiz: document.querySelector("#start-quiz"),
  quizStage: document.querySelector("#quiz-stage"),
  quizProgress: document.querySelector("#quiz-progress"),
  quizPrompt: document.querySelector("#quiz-prompt"),
  quizOptions: document.querySelector("#quiz-options"),
  spellingForm: document.querySelector("#spelling-form"),
  spellingAnswer: document.querySelector("#spelling-answer"),
  submitSpelling: document.querySelector("#submit-spelling"),
  quizFeedback: document.querySelector("#quiz-feedback"),
  correctAnswer: document.querySelector("#quiz-correct-answer"),
  nextQuestion: document.querySelector("#next-question"),
  lastScore: document.querySelector("#last-score"),
  mistakeList: document.querySelector("#mistake-list"),
  retryMistakes: document.querySelector("#retry-mistakes"),
  clearProgress: document.querySelector("#clear-progress")
};

const unavailableStorage = {
  getItem() { throw new Error("Storage unavailable"); },
  setItem() { throw new Error("Storage unavailable"); },
  removeItem() { throw new Error("Storage unavailable"); }
};

let storageAvailable = true;
let store;
try {
  const storage = window.localStorage;
  const probeKey = `${STORAGE_KEY}-probe`;
  storage.setItem(probeKey, "1");
  storage.removeItem(probeKey);
  store = progressStorage(storage, STORAGE_KEY);
} catch {
  storageAvailable = false;
  store = progressStorage(unavailableStorage, STORAGE_KEY);
}

const state = {
  cardOrder: [...VOCABULARY],
  cardIndex: 0,
  flipped: false,
  progress: store.load(validIds),
  quiz: null
};

function shuffle(values) {
  const result = [...values];
  for (let index = result.length - 1; index > 0; index -= 1) {
    const target = Math.floor(Math.random() * (index + 1));
    [result[index], result[target]] = [result[target], result[index]];
  }
  return result;
}

function announce(message = "") {
  const warning = storageAvailable
    ? ""
    : "Storage is unavailable. Progress will continue for this session only.";
  elements.status.textContent = [warning, message].filter(Boolean).join(" ");
}

function saveProgress(message = "") {
  if (!store.save(state.progress)) {
    storageAvailable = false;
  }
  announce(message);
}

function setView(viewId) {
  for (const view of elements.views) {
    view.hidden = view.id !== viewId;
  }
  for (const button of elements.viewButtons) {
    button.setAttribute("aria-pressed", String(button.dataset.viewButton === viewId));
  }
  if (viewId === "mistakes-view") renderMistakes();
}

function renderCard() {
  const entry = state.cardOrder[state.cardIndex];
  elements.cardCount.textContent = `${state.cardIndex + 1} / ${state.cardOrder.length}`;
  elements.cardTerm.textContent = entry.term;
  elements.cardDefinition.textContent = entry.definition;
  elements.cardZh.textContent = entry.zh;
  elements.cardSource.textContent = `Source: ${entry.source}`;
  elements.cardPage.textContent = `PDF page ${entry.page}`;
  elements.cardFront.hidden = state.flipped;
  elements.cardBack.hidden = !state.flipped;
  elements.flipCard.textContent = state.flipped ? "Show term" : "Flip";

  const familiar = state.progress.familiar.includes(entry.id);
  const review = state.progress.review.includes(entry.id);
  elements.markFamiliar.textContent = familiar ? "✓ Familiar" : "Mark familiar";
  elements.markFamiliar.setAttribute("aria-pressed", String(familiar));
  elements.markReview.textContent = review ? "★ Review marked" : "Mark for review";
  elements.markReview.setAttribute("aria-pressed", String(review));
}

function moveCard(offset) {
  state.cardIndex = (state.cardIndex + offset + state.cardOrder.length) % state.cardOrder.length;
  state.flipped = false;
  renderCard();
}

function markCard(kind) {
  const entryId = state.cardOrder[state.cardIndex].id;
  const other = kind === "familiar" ? "review" : "familiar";
  const selected = new Set(state.progress[kind]);
  selected.has(entryId) ? selected.delete(entryId) : selected.add(entryId);
  state.progress[kind] = [...selected];
  state.progress[other] = state.progress[other].filter((id) => id !== entryId);
  saveProgress(kind === "familiar" ? "Familiar status updated." : "Review status updated.");
  renderCard();
}

function renderMistakes() {
  elements.mistakeList.replaceChildren();
  const mistakes = state.progress.mistakes.map((id) => byId.get(id)).filter(Boolean);
  if (mistakes.length === 0) {
    const item = document.createElement("li");
    item.textContent = "No mistakes saved yet.";
    elements.mistakeList.append(item);
  } else {
    for (const entry of mistakes) {
      const item = document.createElement("li");
      item.textContent = `${entry.term} — ${entry.zh} (PDF page ${entry.page}, ${entry.source})`;
      elements.mistakeList.append(item);
    }
  }
  const score = state.progress.lastScore;
  elements.lastScore.textContent = score
    ? `Last score: ${score.correct} / ${score.total}`
    : "No completed quiz yet.";
  elements.retryMistakes.disabled = mistakes.length === 0;
}

function resetQuizFeedback() {
  elements.quizFeedback.textContent = "";
  elements.quizFeedback.removeAttribute("data-result");
  elements.correctAnswer.textContent = "";
  elements.nextQuestion.hidden = true;
}

function renderQuizQuestion() {
  const quiz = state.quiz;
  const entry = quiz.entries[quiz.index];
  quiz.locked = false;
  resetQuizFeedback();
  elements.quizProgress.textContent = `Question ${quiz.index + 1} / ${quiz.entries.length}`;
  elements.quizOptions.replaceChildren();
  elements.spellingAnswer.value = "";

  if (quiz.mode === "spelling") {
    quiz.question = { entryId: entry.id, prompt: entry.definition, answer: entry.term };
    elements.quizPrompt.textContent = quiz.question.prompt;
    elements.quizOptions.hidden = true;
    elements.spellingForm.hidden = false;
    elements.spellingAnswer.disabled = false;
    elements.submitSpelling.disabled = false;
    elements.spellingAnswer.focus();
    return;
  }

  quiz.question = createChoiceQuestion(entry, VOCABULARY, quiz.mode);
  elements.quizPrompt.textContent = quiz.question.prompt;
  elements.quizOptions.hidden = false;
  elements.spellingForm.hidden = true;
  for (const option of quiz.question.options) {
    const button = document.createElement("button");
    button.type = "button";
    button.textContent = option;
    button.addEventListener("click", () => answerQuestion(option));
    elements.quizOptions.append(button);
  }
}

function answerQuestion(answer) {
  const quiz = state.quiz;
  if (!quiz || quiz.locked) return;
  quiz.locked = true;
  const entryId = quiz.question.entryId;
  const correct = quiz.mode === "spelling"
    ? gradeSpelling(answer, quiz.question.answer)
    : answer === quiz.question.answer;

  for (const button of elements.quizOptions.querySelectorAll("button")) {
    button.disabled = true;
  }
  elements.spellingAnswer.disabled = true;
  elements.submitSpelling.disabled = true;
  elements.quizFeedback.dataset.result = correct ? "correct" : "incorrect";
  elements.quizFeedback.textContent = correct ? "✓ Correct" : "✗ Incorrect";
  elements.correctAnswer.textContent = `Correct answer: ${quiz.question.answer}`;
  elements.nextQuestion.hidden = false;

  const mistakes = new Set(state.progress.mistakes);
  if (correct) {
    quiz.correct += 1;
    if (quiz.mistakesOnly) mistakes.delete(entryId);
  } else {
    mistakes.add(entryId);
  }
  state.progress.mistakes = [...mistakes];
  saveProgress();
  elements.nextQuestion.focus();
}

function finishQuiz() {
  const quiz = state.quiz;
  state.progress.lastScore = { correct: quiz.correct, total: quiz.entries.length };
  saveProgress(`Quiz complete: ${quiz.correct} / ${quiz.entries.length}.`);
  elements.quizProgress.textContent = "Quiz complete";
  elements.quizPrompt.textContent = `Score: ${quiz.correct} / ${quiz.entries.length}`;
  elements.quizOptions.replaceChildren();
  elements.quizOptions.hidden = false;
  elements.spellingForm.hidden = true;
  resetQuizFeedback();
  renderMistakes();
  state.quiz = null;
}

function nextQuestion() {
  if (!state.quiz || !state.quiz.locked) return;
  state.quiz.index += 1;
  if (state.quiz.index >= state.quiz.entries.length) {
    finishQuiz();
  } else {
    renderQuizQuestion();
  }
}

function startQuiz({ mistakesOnly = elements.quizScope.value === "mistakes" } = {}) {
  const pool = mistakesOnly
    ? state.progress.mistakes.map((id) => byId.get(id)).filter(Boolean)
    : VOCABULARY;
  if (pool.length === 0) {
    elements.quizStage.hidden = true;
    announce("There are no saved mistakes to retry.");
    return;
  }
  const entries = selectQuizEntries(pool);
  const selectedMode = elements.quizMode.value;
  state.quiz = {
    mode: QUIZ_MODES.has(selectedMode) ? selectedMode : "term-to-zh",
    mistakesOnly,
    entries,
    index: 0,
    correct: 0,
    locked: false,
    question: null
  };
  elements.quizStage.hidden = false;
  announce();
  renderQuizQuestion();
}

for (const button of elements.viewButtons) {
  button.addEventListener("click", () => setView(button.dataset.viewButton));
}

elements.cardOrder.addEventListener("change", () => {
  state.cardOrder = elements.cardOrder.value === "random"
    ? shuffle(VOCABULARY)
    : [...VOCABULARY];
  state.cardIndex = 0;
  state.flipped = false;
  renderCard();
});
elements.previousCard.addEventListener("click", () => moveCard(-1));
elements.nextCard.addEventListener("click", () => moveCard(1));
elements.flipCard.addEventListener("click", () => {
  state.flipped = !state.flipped;
  renderCard();
});
elements.markReview.addEventListener("click", () => markCard("review"));
elements.markFamiliar.addEventListener("click", () => markCard("familiar"));
elements.startQuiz.addEventListener("click", () => startQuiz());
elements.nextQuestion.addEventListener("click", nextQuestion);
elements.spellingForm.addEventListener("submit", (event) => {
  event.preventDefault();
  answerQuestion(elements.spellingAnswer.value);
});
elements.retryMistakes.addEventListener("click", () => {
  elements.quizScope.value = "mistakes";
  setView("quiz-view");
  startQuiz({ mistakesOnly: true });
});
elements.clearProgress.addEventListener("click", () => {
  if (!window.confirm("確定要清除所有熟悉度、錯題和測驗紀錄嗎？")) return;
  state.progress = defaultProgress();
  if (!store.clear()) storageAvailable = false;
  renderCard();
  renderMistakes();
  announce("Saved progress cleared.");
});

renderCard();
renderMistakes();
announce();

})();

  </script>
